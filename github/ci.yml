name: EVA03 CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: test-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: "127.0.0.1,localhost"

      AZURE_ACCOUNT_NAME: fake
      AZURE_ACCOUNT_KEY: fake
      AZURE_CONTAINER: media

      ORACLE_USER: ADMIN
      ORACLE_PASSWORD: fake
      ORACLE_DSN: fake
      ORACLE_WALLET_PATH: wallet
      ORACLE_WALLET_PASSWORD: fake

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar proyecto Django
        run: |
          python manage.py check

      - name: Ejecutar migraciones de prueba
        run: |
          python manage.py migrate --noinput