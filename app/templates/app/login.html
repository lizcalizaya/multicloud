{% extends 'app/base.html' %}

{% block content %}
<h1>Iniciar sesión</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}

        <label>Usuario</label>
        {{ form.username }}

        <label>Contraseña</label>
        {{ form.password }}

        <button type="submit">Entrar</button>
    </form>
</div>
{% endblock %}
