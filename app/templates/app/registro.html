{% extends 'app/base.html' %}

{% block content %}

<style>
    .auth-wrapper {
        min-height: 75vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-card {
        width: 100%;
        max-width: 540px;
        background: white;
        border-radius: 30px;
        padding: 45px;
        border: 1px solid #fbcfe8;
        box-shadow: 0 18px 40px rgba(190, 24, 93, 0.12);
    }

    .auth-icon {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        background: #fce7f3;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
        margin: 0 auto 20px auto;
    }

    .auth-card h1 {
        text-align: center;
        color: #be185d;
        font-size: 36px;
        margin-bottom: 10px;
    }

    .auth-card p {
        text-align: center;
        color: #6b7280;
        margin-bottom: 30px;
    }

    .auth-card label {
        display: block;
        margin-bottom: 7px;
        font-weight: 700;
        color: #374151;
    }

    .auth-card input {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        border: 1px solid #f9a8d4;
        margin-bottom: 18px;
        font-size: 16px;
    }

    .auth-card input:focus {
        outline: none;
        border-color: #ec4899;
        box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.15);
    }

    .auth-card button {
        width: 100%;
        background: #ec4899;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 14px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 5px;
    }

    .auth-card button:hover {
        background: #db2777;
    }

    .auth-link {
        text-align: center;
        margin-top: 22px;
        color: #6b7280;
    }

    .auth-link a {
        color: #be185d;
        font-weight: bold;
        text-decoration: none;
    }

    .error-box {
        background: #fee2e2;
        color: #991b1b;
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 18px;
        text-align: center;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-icon">🎀</div>

        <h1>Crear cuenta</h1>
        <p>Regístrate para administrar pedidos personalizados de MichiStyle.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="error-box">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <label>Usuario</label>
            <input type="text" name="username" placeholder="Crea un nombre de usuario" required>

            <label>Contraseña</label>
            <input type="password" name="password1" placeholder="Crea una contraseña" required>

            <label>Repetir contraseña</label>
            <input type="password" name="password2" placeholder="Repite la contraseña" required>

            <button type="submit">Crear cuenta</button>
        </form>

        <div class="auth-link">
            ¿Ya tienes cuenta?
            <a href="{% url 'login' %}">Iniciar sesión</a>
        </div>
    </div>
</div>

{% endblock %}
