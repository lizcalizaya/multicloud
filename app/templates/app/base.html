<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MichiStyle</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #fff1f7, #fce7f3, #ffffff);
            color: #1f2937;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #ffffff;
            padding: 28px 22px;
            border-right: 1px solid #fbcfe8;
            box-shadow: 6px 0 25px rgba(190, 24, 93, 0.08);
        }

        .brand {
            font-size: 30px;
            font-weight: 800;
            color: #be185d;
            margin-bottom: 5px;
        }

        .brand span {
            color: #ec4899;
        }

        .brand-subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 35px;
        }

        .menu a {
            display: block;
            text-decoration: none;
            color: #374151;
            padding: 14px 16px;
            border-radius: 14px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .menu a:hover {
            background: #fce7f3;
            color: #be185d;
        }

        .main {
            flex: 1;
            padding: 35px 45px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .topbar h1 {
            margin: 0;
            color: #111827;
            font-size: 34px;
        }

        .topbar p {
            margin: 5px 0 0 0;
            color: #6b7280;
        }

        .logout {
            background: #ec4899;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
        }

        .logout:hover {
            background: #db2777;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid #fbcfe8;
            box-shadow: 0 10px 28px rgba(190, 24, 93, 0.10);
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            background: #ec4899;
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            text-decoration: none;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        .btn:hover {
            background: #db2777;
        }

        .btn-outline {
            background: white;
            color: #be185d;
            border: 2px solid #f9a8d4;
        }

        .btn-outline:hover {
            background: #fff1f7;
        }

        input, textarea, select {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            border: 1px solid #f9a8d4;
            margin-top: 7px;
            margin-bottom: 18px;
            font-size: 15px;
            outline: none;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #ec4899;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.15);
        }

        label {
            font-weight: 700;
            color: #374151;
        }

        .footer {
            text-align: center;
            color: #9ca3af;
            font-size: 13px;
            margin-top: 35px;
        }

        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .main {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="brand">Michi<span>Style</span></div>
        <div class="brand-subtitle">Artículos personalizados para gatos</div>

        <div class="menu">
            <a href="{% url 'panel' %}">Inicio</a>
            <a href="{% url 'archivos' %}">Pedidos y diseños</a>
            <a href="{% url 'probar_oci' %}">Estado del sistema</a>
            <a href="{% url 'logout' %}">Cerrar sesión</a>
        </div>
    </aside>

    <main class="main">
        {% block content %}
        {% endblock %}

        <div class="footer">
            Sistema web para gestión de artículos personalizados para gatos.
        </div>
    </main>
</div>

</body>
</html>
